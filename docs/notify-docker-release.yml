# This file belongs in humhub/humhub at:
#   .github/workflows/notify-docker-release.yml
#
# Prerequisites:
#   A PAT with actions:write permission on humhub/docker must be stored
#   as secret DOCKER_REPO_DISPATCH_TOKEN in humhub/humhub.
name: Notify Docker Repo on Release
on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
    - name: Send repository_dispatch to humhub/docker
      run: |
        curl --fail --show-error -X POST \
          -H "Authorization: Bearer ${{ secrets.DOCKER_REPO_DISPATCH_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/humhub/docker/dispatches" \
          -d '{"event_type":"humhub-release","client_payload":{"tag":"${{ github.event.release.tag_name }}","target_commitish":"${{ github.event.release.target_commitish }}"}}'
